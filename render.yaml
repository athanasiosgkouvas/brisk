# Render Blueprint — Brisk Enoki sponsor relay (backend/).
#
# Deploy:
#   1. Push this repo to GitHub.
#   2. Render dashboard → New + → Blueprint → pick the repo. Render reads this file.
#   3. When prompted, paste ENOKI_PRIVATE_KEY (it's a secret — sync:false, not committed).
#   4. After it goes live you get a URL like https://brisk-backend.onrender.com.
#   5. Set PUBLIC_BASE_URL to that URL (used to build shareable payment-link URLs).
#
# The backend reads PORT from the environment (Render sets it) and binds all
# interfaces, exposes GET /health for the health check, and needs no .env file
# (env vars come from the dashboard). Payment links persist in the managed
# Postgres below; DATABASE_URL is wired automatically via fromDatabase.
databases:
  - name: brisk-db
    plan: free
    databaseName: brisk
    postgresMajorVersion: "16"

services:
  - type: web
    name: brisk-backend
    runtime: node
    plan: free
    rootDir: backend
    # tsx/typescript are devDependencies; --include=dev ensures they're present
    # for the tsc build even when Render sets NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENOKI_PRIVATE_KEY
        sync: false # set in the Render dashboard (secret)
      - key: SPONSORSHIP_DAILY_LIMIT_TX_COUNT
        value: "100"
      # Brisk's published package id. Required: the sponsor relay fails CLOSED
      # (sponsors nothing) when this is unset, so the move-call allowlist is the
      # authoritative backstop on what the gas key will pay for.
      - key: BRISK_PACKAGE_ID
        value: "0xcbd54ab52fad4110fdad2d9fd8e92e84dd87db436f2b608cc47819f7d4fd03cc"
      # Payment-link store. Wired automatically from the managed Postgres above.
      - key: DATABASE_URL
        fromDatabase:
          name: brisk-db
          property: connectionString
      # Public https origin for building shareable /p/<code> link URLs. Update if
      # the service URL differs from this.
      - key: PUBLIC_BASE_URL
        value: "https://brisk-z5bu.onrender.com"
      # CORS is intentionally left unset → permissive. The native app sends no
      # Origin header, so CORS is moot; set CORS_ALLOWED_ORIGINS only if you add
      # a web client.
